<!DOCTYPE html>
<html lang="en-NZ">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Leave a Review | The Daily on Suffolk</title>
<meta name="description" content="Tell us how we did at The Daily on Suffolk — your feedback helps us keep getting better." />
<meta name="theme-color" content="#2a2320" />
<link rel="icon" href="favicon.svg" type="image/svg+xml" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400..700;1,400&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
<style>
  .rate-wrap { min-height: 100vh; display: grid; place-items: center; background: var(--espresso); padding: 100px 24px 60px; text-align: center; }
  .rate-card { max-width: 560px; }
  .rate-card .eyebrow { color: #f0c3a6; }
  .rate-card h1 { color: #fff; font-size: clamp(2.2rem, 6vw, 3.4rem); margin: 14px 0 12px; }
  .rate-card p.sub { color: rgba(255,255,255,.8); margin-bottom: 34px; }
  .stars-pick { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; }
  .stars-pick button {
    background: none; border: 0; cursor: pointer; font-size: 3rem; line-height: 1;
    color: rgba(255,255,255,.28); transition: transform .15s var(--ease), color .15s;
  }
  .stars-pick button:hover, .stars-pick button.lit { color: var(--clay); transform: scale(1.12); }
  .rate-note { color: rgba(255,255,255,.55); font-size: .9rem; }
  .rate-back { display: inline-block; margin-top: 34px; color: rgba(255,255,255,.7); font-size: .9rem; }
  .rate-back:hover { color: var(--clay); }
  .rate-mark { font-family: "Instrument Serif", serif; color:#fff; font-size: 1.4rem; margin-bottom: 26px; }
  .rate-mark span { display:block; font-family:"Instrument Sans",sans-serif; font-size:.7rem; letter-spacing:.28em; text-transform:uppercase; color:#f0c3a6; margin-top:4px;}
</style>
</head>
<body>
<div class="rate-wrap">
  <div class="rate-card">
    <div class="rate-mark">The Daily on Suffolk<span>Christchurch</span></div>
    <p class="eyebrow">Your feedback</p>
    <h1>How was your visit?</h1>
    <p class="sub">Tap a star to let us know. We read every bit of it.</p>
    <div class="stars-pick" id="stars" role="radiogroup" aria-label="Rate your experience from 1 to 5 stars">
      <button data-v="1" aria-label="1 star">★</button>
      <button data-v="2" aria-label="2 stars">★</button>
      <button data-v="3" aria-label="3 stars">★</button>
      <button data-v="4" aria-label="4 stars">★</button>
      <button data-v="5" aria-label="5 stars">★</button>
    </div>
    <p class="rate-note">5 &amp; 4 stars take you to Google · 3 or fewer comes straight to us</p>
    <a class="rate-back" href="index.html">← Back to the site</a>
  </div>
</div>

<script>
  // Update to your live Google review link when known.
  var GOOGLE_REVIEW_URL = "https://g.page/r/PLACEHOLDER";
  var btns = document.querySelectorAll("#stars button");
  btns.forEach(function (b) {
    b.addEventListener("mouseenter", function () {
      var v = +b.dataset.v;
      btns.forEach(function (x) { x.classList.toggle("lit", +x.dataset.v <= v); });
    });
    b.addEventListener("mouseleave", function () { btns.forEach(function (x) { x.classList.remove("lit"); }); });
    b.addEventListener("click", function () {
      var v = +b.dataset.v;
      if (v >= 4) { window.location.href = GOOGLE_REVIEW_URL; }
      else { window.location.href = "private.html?rating=" + v; }
    });
  });
</script>
</body>
</html>
